services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: psk-poc-backend
    environment:
      PORT: "8081"
      MAX_LOGS: "100"
    ports:
      - "8081:8081"

  zuul:
    build:
      context: .
      dockerfile: zuul-build/Dockerfile
    container_name: psk-poc-zuul
    environment:
      BACKEND_HOST: backend
      BACKEND_PORT: "8081"
      SERVER_PORT: "7001"
      JAVA_TOOL_OPTIONS: >-
        -Darchaius.configurationSource.additionalUrls=file:///opt/zuul/config/zuul.properties
        -Deureka.client.serviceUrl.defaultZone=http://eureka:8761/eureka
        -Dzuul.server.port.psk=7002
        ${EXTRA_JVM_OPTS:-}
    ports:
      - "7001:7001"
      - "7002:7002"
    depends_on:
      - backend
      - eureka

  eureka:
    build:
      context: ./eureka
      dockerfile: Dockerfile
    container_name: psk-poc-eureka
    ports:
      - "8761:8761"
    restart: unless-stopped

  launcher:
    build:
      context: ./launcher
      dockerfile: Dockerfile
    container_name: psk-poc-launcher
    environment:
      ZUUL_HOST: zuul
      ZUUL_PSK_PORT: "7002"
      PROBE_COUNT: "10"
    ports:
      - "5000:5000"
    depends_on:
      - backend
      - zuul
